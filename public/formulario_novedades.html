<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Novedades | CINTE</title>
    <style>
        :root {
            --bg: #0b1620;
            --card: #0f2437;
            --text: #e7eef7;
            --muted: #9fb3c8;
            --accent: #2a90ff;
            --border: #21405f;
            --ok: #1fc76a;
            --error: #ff6b6b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(15, 36, 55, 0.95);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .logo { height: 32px; margin-right: 12px; }
        .brand-name { font-weight: 700; font-size: 1.2rem; color: var(--accent); }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 { margin: 0 0 0.5rem; font-size: 1.8rem; color: var(--accent); }
        p.subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .field { display: flex; flex-direction: column; margin-bottom: 1.2rem; }
        
        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--muted);
        }

        label span { color: var(--ok); margin-left: 4px; }

        input, select {
            background: #162a3d;
            border: 1px solid var(--border);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(42, 144, 255, 0.2);
        }

        .full-width { grid-column: span 2; }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        .btn-submit:hover { background: #1a7ae0; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        #estado {
            text-align: center;
            margin-top: 1.5rem;
            font-weight: 600;
            min-height: 1.2rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <img src="/assets/logo-cinte.png" class="logo" alt="CINTE">
        <span class="brand-name">CINTE</span>
    </header>

    <div class="main-container">
        <div class="form-card">
            <h1>Solicitud de Novedades</h1>
            <p class="subtitle">Completa los datos para registrar tu novedad en el sistema.</p>
            
            <form id="formNovedad">
                <div class="grid">
                    <div class="field">
                        <label>Nombre y Apellido <span>*</span></label>
                        <input type="text" id="nombre" placeholder="Ej: Kevin Ovalle" required>
                    </div>
                    <div class="field">
                        <label>Cédula <span>*</span></label>
                        <input type="number" id="cedula" placeholder="Documento de identidad" required>
                    </div>
                    <div class="field">
                        <label>Correo del Solicitante</label>
                        <input type="email" id="correo" placeholder="usuario@dominio.com">
                    </div>
                    <div class="field">
                        <label>Tipo de Novedad <span>*</span></label>
                        <select id="tipo" required>
                            <option value="">Selecciona...</option>
                            <option>Incapacidad</option>
                            <option>Vacaciones</option>
                            <option>Hora Extra</option>
                            <option>Licencia de Luto</option>
                            <option>Permiso personal</option>
                        </select>
                    </div>

                    <div id="horasContainer" class="full-width grid hidden">
                        <div class="field">
                            <label>Cantidad de Horas</label>
                            <input type="number" id="cantidadHoras" placeholder="0">
                        </div>
                        <div class="field">
                            <label>Jornada</label>
                            <select id="tipoJornada">
                                <option>Diurna</option>
                                <option>Nocturna</option>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label>Fecha Inicio <span>*</span></label>
                        <input type="date" id="fechaInicio" required>
                    </div>
                    <div class="field">
                        <label>Fecha Fin</label>
                        <input type="date" id="fechaFin">
                    </div>

                    <div class="field full-width">
                        <label>Soporte / Adjunto (PDF, JPG, PNG)</label>
                        <input type="file" id="soporte">
                    </div>
                </div>

                <button type="submit" id="btnEnviar" class="btn-submit">Enviar Solicitud</button>
                <div id="estado"></div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('formNovedad');
        const tipo = document.getElementById('tipo');
        const horasContainer = document.getElementById('horasContainer');
        const estado = document.getElementById('estado');
        const btnEnviar = document.getElementById('btnEnviar');

        // Mostrar u ocultar campos de horas extras según selección
        tipo.addEventListener('change', () => {
            if (tipo.value === 'Hora Extra') {
                horasContainer.classList.remove('hidden');
            } else {
                horasContainer.classList.add('hidden');
            }
        });

        form.onsubmit = async (e) => {
            e.preventDefault();
            btnEnviar.disabled = true;
            estado.textContent = "Procesando envío...";
            estado.style.color = "var(--muted)";

            try {
                const payload = {
                    nombre: document.getElementById('nombre').value,
                    cedula: document.getElementById('cedula').value,
                    correoSolicitante: document.getElementById('correo').value,
                    tipoNovedad: tipo.value,
                    fechaInicio: document.getElementById('fechaInicio').value,
                    fechaFin: document.getElementById('fechaFin').value || 'N/A',
                    cantidadHoras: document.getElementById('cantidadHoras').value || 0,
                    tipoHoraExtra: document.getElementById('tipoJornada').value
                };

                const res = await fetch('/api/enviar-novedad', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    estado.innerHTML = "✅ ¡Guardado con éxito!";
                    estado.style.color = "var(--ok)";
                    form.reset();
                    horasContainer.classList.add('hidden');
                } else {
                    throw new Error();
                }
            } catch (err) {
                estado.innerHTML = "❌ Error al enviar la solicitud";
                estado.style.color = "var(--error)";
            } finally {
                btnEnviar.disabled = false;
            }
        };
    </script>
</body>
</html>
