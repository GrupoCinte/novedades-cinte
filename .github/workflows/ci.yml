name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Backend tests
        run: npm run test

      - name: Frontend tests
        run: npm run test:frontend

      - name: Frontend build
        run: npm --prefix react-frontend run build
